# BEGIN_KITTY_FONTS
font_family      family="Iosevka"
bold_font        auto
italic_font      auto
bold_italic_font auto
# END_KITTY_FONTS
#
# font_family      "Iosevka Term Regular"
# bold_font        "Iosevka Term Regular"
# italic_font      "Iosevka Term Regular"
# bold_italic_font "Iosevka Term Regular"
font_size 11.0
disable_ligatures always
detect_urls yes

adjust_baseline 0
cursor_shape block
cursor_blink_interval 0
shell_integration no-cursor
mouse_hide_wait -1
shell /opt/homebrew/bin/fish

enable_audio_bell no
hide_window_decorations yes

remember_window_size  no
initial_window_width  700
initial_window_height 450
dynamic_background_opacity yes
background_opacity 0.9

window_margin_width 8
# window_padding_width 8
tab_bar_margin_width 8
tab_bar_margin_height 0 0
tab_bar_style fade
tab_title_template "{index}: {title}"

# SHORTCUTS

map ctrl+t new_tab

map alt+h previous_tab
map alt+l next_tab

map alt+1 goto_tab 1
map alt+2 goto_tab 2
map alt+3 goto_tab 3
map alt+4 goto_tab 4
map alt+5 goto_tab 5
map alt+6 goto_tab 6
map alt+7 goto_tab 7
map alt+8 goto_tab 8
map alt+9 goto_tab 9
map alt+0 goto_tab 10

map ctrl+, set_tab_title " "

# background_image /home/geoffrey/Pictures/Wallpapers/the-great-wave.png
# background_image_layout scale
# background_image_linear yes

